version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: churn_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
